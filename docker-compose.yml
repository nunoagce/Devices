services:
  # The SQL Server Database
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Pass123
    ports:
      - "1433:1433"

  # Your .NET 10 API
  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=DeviceDb;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True
    depends_on:
      - db